<main class="">
  <div class="mt-6 w-12/12 max-w-xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Login</h1>
    <form
      class="flex flex-col gap-4"
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
    >
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Type here"
        class="input w-full"
        formControlName="email"
      />

      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Type here"
        class="input w-full"
        formControlName="password"
      />

      @if (errorMessage()) {
        <span class="text-red-500 -mb-8 mt-4 text-xs font-bold">
          {{ errorMessage() }}
        </span>
      }

      <button class="btn btn-neutral mt-12" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="loading loading-spinner"></span>
          Loading
        } @else {
          Login
        }
      </button>
    </form>

    <div class="mt-3">
      Don't have an account?
      <a routerLink="/register"> Register</a>
    </div>
  </div>
</main>
